# ============================================================
# HubOne — Vercel 自動部署
# 當推送到 master 分支時，建置 Next.js 並部署到 Vercel Production
# ============================================================
name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: 建置 + 部署
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      # --------------------------------------------------
      # 步驟 1：檢出程式碼
      # --------------------------------------------------
      - name: 檢出程式碼
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 步驟 2：設定 Node.js 20
      # --------------------------------------------------
      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --------------------------------------------------
      # 步驟 3：安裝相依套件
      # --------------------------------------------------
      - name: 安裝相依套件
        run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # --------------------------------------------------
      # 步驟 4：建置 Next.js（含 Prisma generate）
      # --------------------------------------------------
      - name: 建置 Next.js
        run: npm run build

      # --------------------------------------------------
      # 步驟 5：部署到 Vercel Production
      # 使用個人專案，不加 --scope 和 --project
      # Vercel CLI 會自動偵測 next.config.ts / next.config.js
      # --------------------------------------------------
      - name: 部署到 Vercel Production
        run: |
          npx vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
