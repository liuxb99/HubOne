# ============================================================
# HubOne — Vercel + GitHub Pages 自動部署
# 當推送到 master 分支時，建置 Next.js 並部署到 Vercel Production
# 同時部署 Landing Page 到 GitHub Pages
# ============================================================
name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: 建置 + 部署
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安裝相依套件
        run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 建置 Next.js
        run: npm run build

      - name: 部署到 Vercel Production
        run: |
          npx vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy landing page to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing
          force_orphan: true
          user_name: 'liuxb99'
          user_email: 'cyliu99@gmail.com'
